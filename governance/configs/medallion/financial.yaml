# Shared financial medallion schema — paths come from environments/{env}.yaml (medallion section)
# Ranger (Cloudera CDP 7.3.1 + SBI): cm_hive _db_plcy + _uri_plcy + cm_ozone _data_{layer}_key_plcy
# See governance/configs/security/ranger_iceberg_ozone_pairs.yaml
database: sbi_financial

tables:
  brnz:
    name: spark_catalog.sbi_financial.brnz_transactions
    partition_cols:
      - transaction_date
  slvr:
    name: spark_catalog.sbi_financial.slvr_transactions
    partition_cols:
      - transaction_date
  gld:
    name: spark_catalog.sbi_financial.gld_daily_report
    partition_cols:
      - report_date

sdv:
  target_gb: 10
  seed_rows: 5000
  batch_rows: 100000
