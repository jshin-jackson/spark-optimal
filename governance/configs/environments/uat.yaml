environment: uat
hdfs_uri: hdfs://ns1
ofs_uri: ofs://ozone1782570080
hms_host: ccycloud-1.jshin-sbi.root.comops.site
hms_hosts: ccycloud-1.jshin-sbi.root.comops.site,ccycloud-6.jshin-sbi.root.comops.site
hms_uris: thrift://ccycloud-1.jshin-sbi.root.comops.site:9083,thrift://ccycloud-6.jshin-sbi.root.comops.site:9083
hms_port: "9083"
krb_realm: ${KRB_REALM}
ozone_om_service_id: ozone1782570080
ozone_om_address: ccycloud-2.jshin-sbi.root.comops.site:9862,ccycloud-8.jshin-sbi.root.comops.site:9862
warehouse_base: ofs://ozone1782570080/uat/data
yarn_queue_default: etl

authorization:
  model: ranger
  principal: systest@${KRB_REALM}
  policy_inventory: governance/configs/security/ranger.yaml
  doc: docs/operations/ranger-authorization.md
  forbidden: [chmod, chown, setfacl, hdfs_dfs_chmod, ozone_native_acl]

ozone_encryption:
  enabled: true
  kms_service: cm_kms
  encryption_key: ozone_encryption_key
  volume: uat
  bucket: data
  config: governance/configs/security/ozone_encryption.yaml
  setup_script: scripts/infrastructure/setup_ozone_encrypted_bucket.sh

hdfs_encryption:
  enabled: true
  kms_service: cm_kms
  encryption_key: hdfs_encryption_key
  config: governance/configs/security/hdfs_encryption.yaml
  setup_script: scripts/infrastructure/setup_hdfs_encryption_zone.sh

# UAT YARN cluster capacity (SBI 검증 환경)
cluster:
  total_vcores: 1085
  total_memory_gb: 20163          # 19.69 TB (19.69 × 1024 GB)
  node_managers: 40
  cores_per_node: 64              # each NM: 64 vCore (SBI UAT spec)
  memory_per_node_gb: 1229        # 1.2 TiB per NM (1.2 × 1024 GB)
  yarn_reserved_ratio: 0.10       # 10% headroom for AM / system / other apps

# Spark resource caps derived from cluster size above
resource_limits:
  max_executors_absolute: 80
  max_executor_cores: 4
  executor_memory: "8g"
  executor_memory_overhead: "2g"
  driver_memory: "4g"
  driver_cores: 2
  shuffle_partitions: 100

medallion:
  hdfs_raw_path: hdfs://ns1/uat/data/migration/upload
  brnz_base: ofs://ozone1782570080/uat/data/brnz
  slvr_base: ofs://ozone1782570080/uat/data/slvr
  gld_base: ofs://ozone1782570080/uat/data/gld
  table_suffixes:
    brnz: transactions
    slvr: transactions
    gld: daily_transaction_report
