# Apache Ranger authorization inventory for spark-optimal
#
# SBI policy: HDFS, HMS (Hive), Spark, and Ozone access is enforced ONLY by Ranger.
# Do NOT use chmod, chown, setfacl, hdfs dfs -chmod, or Ozone native ACLs for access control.
#
# Gateway principal (authentication): systest@<KRB_REALM> via systest.keytab
# Authorization: Ranger policies must grant this principal the actions below.

principal: systest@${KRB_REALM}
principal_note: "Set KRB_REALM in config/env.conf; default QE-INFRA-AD.CLOUDERA.COM"

# Ranger / Ranger KMS hosts (DEV HA) — governance/configs/infrastructure/ranger_hosts.yaml
ranger_hosts:
  config: governance/configs/infrastructure/ranger_hosts.yaml
  ranger_admin:
    hosts:
      - ccycloud-1.jshin-sbi.root.comops.site
      - ccycloud-10.jshin-sbi.root.comops.site
    port: 6182
    url: https://ccycloud-1.jshin-sbi.root.comops.site:6182
  ranger_kms:
    hosts:
      - ccycloud-1.jshin-sbi.root.comops.site
      - ccycloud-10.jshin-sbi.root.comops.site
    port: 9494
    kms_provider_uri: kms://https@ccycloud-1.jshin-sbi.root.comops.site:9494/kms

services:
  hdfs:
    ranger_service: cm_hdfs
    plugin: ranger-hdfs-plugin
    description: Raw ingest paths, Spark event logs, delegation token filesystem access
  hive:
    ranger_service: cm_hive
    plugin: ranger-hive-plugin
    description: HMS metadata — database, table, column privileges for Iceberg catalog
  ozone:
    ranger_service: cm_ozone
    plugin: ranger-ozone-plugin
    description: Medallion Ozone data paths — paired with cm_hive per Iceberg table
  spark:
    ranger_service: cm_spark
    plugin: ranger-spark-plugin
    description: Spark SQL / job access where Spark Ranger plugin is enabled (align with Hive/HDFS/Ozone)
  ranger_kms:
    plugin: ranger-kms
    service: cm_kms
    description: TDE keys hdfs_encryption_key (HDFS EZ) and ozone_encryption_key (Ozone bucket)

# Iceberg on Ozone — Cloudera CDP 7.3.1 Ranger model (Hadoop SQL + cm_ozone)
iceberg_ozone_pairs:
  config: governance/configs/security/ranger_iceberg_ozone_pairs.yaml
  doc: docs/operations/ranger-iceberg-ozone-pairs.md
  print_script: scripts/security/print_ranger_iceberg_pairs.sh
  cloudera_docs:
    - https://docs.cloudera.com/cdp-private-cloud-base/7.3.1/spark-iceberg/topics/iceberg-ranger-introduction.html
    - https://docs.cloudera.com/cdp-private-cloud-base/7.3.1/iceberg-how-to/topics/iceberg-ozone-policy.html
    - https://docs.cloudera.com/cdp-private-cloud-base/7.3.1/spark-iceberg/topics/iceberg-setup-ranger.html
  rule: "Per table: cm_hive Storage Handler + {env}_{table}_db_plcy + {env}_{table}_uri_plcy + cm_ozone {env}_data_{layer}_key_plcy"
  sbi_naming: "cm_hive _db_plcy + _uri_plcy + cm_ozone _data_{layer}_key_plcy (see naming_convention in ranger_iceberg_ozone_pairs.yaml)"
  engines: [Spark, Hive, Impala]

# HDFS TDE — raw ingest paths use Ranger KMS Encryption Zones (see hdfs_encryption.yaml)
hdfs_encryption:
  kms_service: cm_kms
  encryption_key: hdfs_encryption_key
  config: governance/configs/security/hdfs_encryption.yaml
  doc: docs/operations/hdfs-encryption.md

# Ozone TDE — all Medallion buckets use Ranger KMS key ozone_encryption_key (see ozone_encryption.yaml)
ozone_encryption:
  kms_service: cm_kms
  encryption_key: ozone_encryption_key
  bucket_key_flag: "--bucketkey ozone_encryption_key"
  config: governance/configs/security/ozone_encryption.yaml
  doc: docs/operations/ozone-encryption.md

forbidden:
  - hdfs dfs -chmod
  - hdfs dfs -chown
  - setfacl
  - ozone native ACL outside Ranger
  - sudo-based filesystem permission changes

# Per-environment Ranger resource patterns (policy names are site-specific — fill in policy_id)
environments:
  dev:
    hdfs:
      - path: hdfs://ns1/dev/raw/financial/transactions
        actions: [read, write, execute]
      - path: hdfs://ns1/dev/raw/financial
        actions: [read, write, execute]
      - path: hdfs:///user/spark/applicationHistory
        actions: [read, write, execute]
        note: Spark history (conf/*/spark-defaults.conf)
    # Ozone volume/bucket — infrastructure; table data uses iceberg_ozone_pairs (per-table)
    ozone_infrastructure:
      - path: ofs://ozone1782570080/dev
        resource_type: volume
        policy_name: dev_volume_plcy
        actions: [read, write, create]
      - path: ofs://ozone1782570080/dev/data
        resource_type: bucket
        policy_name: dev_data_bucket_plcy
        actions: [read, write, create, delete]
    hive_database:
      ranger_service: cm_hive
      policy_name: dev_sbi_financial_db_plcy
      database: sbi_financial
      actions: [create, select, update, alter, drop, index, lock, all]
    # Per-table cm_hive + cm_ozone — see ranger_iceberg_ozone_pairs.yaml (_db_plcy / _uri_plcy / _key_plcy)
    iceberg_table_pairs:
      - table: brnz_transactions
        ozone_path: ofs://ozone1782570080/dev/data/brnz/transactions
      - table: slvr_transactions
        ozone_path: ofs://ozone1782570080/dev/data/slvr/transactions
      - table: gld_daily_report
        ozone_path: ofs://ozone1782570080/dev/data/gld/daily_transaction_report
    ranger_kms:
      service: cm_kms
      keys:
        hdfs_encryption_key:
          hdfs_service_user: [Get Metadata, Generate EEK]
          gateway_principal: [Generate EEK, Decrypt EEK]
        ozone_encryption_key:
          om_service_user: [Get Metadata, Generate EEK]
          gateway_principal: [Generate EEK, Decrypt EEK]

  uat:
    hdfs:
      - path: hdfs://ns1/uat/raw/financial/transactions
        actions: [read, write, execute]
    ozone_infrastructure:
      - path: ofs://ozone1782570080/uat
        resource_type: volume
        policy_name: uat_volume_plcy
        actions: [read, write, create]
      - path: ofs://ozone1782570080/uat/data
        resource_type: bucket
        policy_name: uat_data_bucket_plcy
        actions: [read, write, create, delete]
    hive_database:
      ranger_service: cm_hive
      policy_name: uat_sbi_financial_db_plcy
      database: sbi_financial
      actions: [create, select, update, alter, drop, index, lock, all]
    iceberg_table_pairs:
      - table: brnz_transactions
        ozone_path: ofs://ozone1782570080/uat/data/brnz/transactions
      - table: slvr_transactions
        ozone_path: ofs://ozone1782570080/uat/data/slvr/transactions
      - table: gld_daily_report
        ozone_path: ofs://ozone1782570080/uat/data/gld/daily_transaction_report

  prod:
    hdfs:
      - path: hdfs://ns1/prod/raw/financial/transactions
        actions: [read, write, execute]
    ozone_infrastructure:
      - path: ofs://ozone1782570080/prod
        resource_type: volume
        policy_name: prod_volume_plcy
        actions: [read, write, create]
      - path: ofs://ozone1782570080/prod/data
        resource_type: bucket
        policy_name: prod_data_bucket_plcy
        actions: [read, write, create, delete]
    hive_database:
      ranger_service: cm_hive
      policy_name: prod_sbi_financial_db_plcy
      database: sbi_financial
      actions: [create, select, update, alter, drop, index, lock, all]
    iceberg_table_pairs:
      - table: brnz_transactions
        ozone_path: ofs://ozone1782570080/prod/data/brnz/transactions
      - table: slvr_transactions
        ozone_path: ofs://ozone1782570080/prod/data/slvr/transactions
      - table: gld_daily_report
        ozone_path: ofs://ozone1782570080/prod/data/gld/daily_transaction_report

policy_request_template:
  summary: "Grant spark-optimal {env} access for {principal}"
  checklist:
    - "Ranger HDFS (cm_hdfs) policy for raw path and Spark history dir"
    - "HDFS Encryption Zone on /{env}/raw/financial/transactions (hdfs_encryption_key)"
    - "Ranger Ozone (cm_ozone) {env}_volume_plcy + {env}_data_bucket_plcy infrastructure"
    - "Cloudera Iceberg-on-Ozone: cm_hive Storage Handler + {env}_{table}_db_plcy + _uri_plcy + {env}_data_{layer}_key_plcy"
    - "SBI triple per table — see ranger_iceberg_ozone_pairs.yaml naming_convention"
    - "Ranger KMS hdfs_encryption_key (hdfs + systest) — HDFS TDE"
    - "Ranger KMS ozone_encryption_key (OM + systest) — Ozone TDE"
    - "Ozone bucket created with --bucketkey ozone_encryption_key"
    - "Confirm cm_spark policies if Spark Ranger plugin enabled"
  verify:
    - "bash scripts/security/print_ranger_iceberg_pairs.sh"
    - "bash scripts/security/security_check.sh"
