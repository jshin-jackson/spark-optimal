# =============================================================================
# SBI Spark Optimal — 환경 설정 템플릿
# =============================================================================
#
# [사용법]
#   1. 이 파일을 복사: cp config/env.template.conf config/env.conf
#   2. Gateway Node에서 source: source config/env.conf
#   3. env.conf 는 .gitignore 처리 — 클러스터별 값은 Git에 올리지 않음
#
# [환경 구분]
#   ENV_NAME / SBI_ENV: dev | uat | prod
#   → conf/{SBI_ENV}/spark-defaults.conf 선택
#
# [Gateway Node 필수]
#   spark-submit 전 kinit: bash scripts/security/kinit_manager.sh
# =============================================================================

export ENV_NAME="dev"
export SBI_ENV="dev"

# ---------------------------------------------------------------------------
# Kerberos — Gateway Node에서 kinit 으로 티켓 발급
# ---------------------------------------------------------------------------
# KRB_REALM: Kerberos 도메인 (Active Directory realm)
# PRINCIPAL: 서비스 계정 (systest@...)
# KEYTAB:    비밀번호 없이 인증하는 keytab 파일 경로
export KRB_REALM="QE-INFRA-AD.CLOUDERA.COM"
export PRINCIPAL="systest@${KRB_REALM}"
export KEYTAB="/opt/cloudera/systest.keytab"

# ---------------------------------------------------------------------------
# Auto-TLS — CDP 클러스터 HTTPS 통신용 truststore
# ---------------------------------------------------------------------------
export TRUSTSTORE_JKS="/var/lib/cloudera-scm-agent/agent-cert/cm-auto-global_truststore.jks"
export TRUSTSTORE_PW="changeit"

# ---------------------------------------------------------------------------
# Hive Metastore (HMS) — HA (고가용) 구성
# ---------------------------------------------------------------------------
# Iceberg catalog가 메타데이터를 HMS에 저장
export HMS_HOST="ccycloud-1.jshin-sbi.root.comops.site"
export HMS_HOSTS="ccycloud-1.jshin-sbi.root.comops.site,ccycloud-6.jshin-sbi.root.comops.site"
export HMS_PORT="9083"
export HMS_URIS="thrift://ccycloud-1.jshin-sbi.root.comops.site:9083,thrift://ccycloud-6.jshin-sbi.root.comops.site:9083"
export HMS_PRINCIPAL="hive/_HOST@${KRB_REALM}"

# ---------------------------------------------------------------------------
# HDFS — Hadoop 분산 파일 시스템
# ---------------------------------------------------------------------------
# HDFS_NAMESERVICE: HA nameservice ID (hdfs-site.xml 과 일치)
export HDFS_NAMESERVICE="ns1"
export HDFS_URI="hdfs://${HDFS_NAMESERVICE}"

# ---------------------------------------------------------------------------
# Apache Ozone (OFS) — 객체 스토리지
# ---------------------------------------------------------------------------
# OZONE_OM_SERVICE_ID: Ozone Manager service ID
# OFS_URI: ofs://{service_id}/bucket/key 형식의 URI prefix
export OZONE_OM_SERVICE_ID="ozone1782570080"
export OZONE_OM_ADDRESS="ccycloud-2.jshin-sbi.root.comops.site:9862,ccycloud-8.jshin-sbi.root.comops.site:9862"
export OFS_URI="ofs://${OZONE_OM_SERVICE_ID}"

# ---------------------------------------------------------------------------
# Spark / Hadoop — CDP 7.3.1 parcel JAR 경로
# ---------------------------------------------------------------------------
# DEV Jenkins CDH build: gbn://74774806 → parcel suffix 700-158
# 다른 클러스터/빌드에서는 아래 명령으로 실제 파일명 확인 후 수정:
#   ls /opt/cloudera/parcels/CDH/jars/iceberg-spark-runtime*.jar
#   ls /opt/cloudera/parcels/CDH/jars/ozone-filesystem-hadoop3*.jar
#   ls /opt/cloudera/parcels/CDH/jars/ozone-filesystem-common*.jar
export HADOOP_CONF_DIR="/etc/hadoop/conf"
export YARN_CONF_DIR="/etc/hadoop/conf"
export ICEBERG_JAR="/opt/cloudera/parcels/CDH/jars/iceberg-spark-runtime-3.5_2.12-1.5.2.7.3.1.700-158.jar"
export SPARK_OZONE_JARS="/opt/cloudera/parcels/CDH/jars/ozone-filesystem-hadoop3-1.4.0.7.3.1.700-158.jar:/opt/cloudera/parcels/CDH/jars/ozone-filesystem-common-1.4.0.7.3.1.700-158.jar"

# ---------------------------------------------------------------------------
# YARN Queue — 부서/워크로드별 리소스 격리
# ---------------------------------------------------------------------------
export YARN_QUEUE_DEFAULT="default"
export YARN_QUEUE_MIGRATION="migration"
export YARN_QUEUE_ETL="etl"

# ---------------------------------------------------------------------------
# 프로젝트 경로 — Gateway Node 설치 위치
# ---------------------------------------------------------------------------
export SPARK_OPTIMAL_HOME="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)"
export SPARK_CONF_DIR="${SPARK_OPTIMAL_HOME}/conf/${SBI_ENV}"

# ---------------------------------------------------------------------------
# Medallion 경로 — 금융 파이프라인 Ozone/HDFS 위치
# ---------------------------------------------------------------------------
# brnz: Bronze (원본), slvr: Silver (정제), gld: Gold (집계 리포트)
# Paths use ${SBI_ENV} — dev | uat | prod (see governance/configs/environments/*.yaml)
export OZONE_MEDALLION_BRNZ="${OFS_URI}/${SBI_ENV}/data/brnz"
export OZONE_MEDALLION_SLVR="${OFS_URI}/${SBI_ENV}/data/slvr"
export OZONE_MEDALLION_GLD="${OFS_URI}/${SBI_ENV}/data/gld"
export HDFS_FINANCIAL_RAW="${HDFS_URI}/${SBI_ENV}/raw/financial/transactions"
export FIN_DB="sbi_financial"
