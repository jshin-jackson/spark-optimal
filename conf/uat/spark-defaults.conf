# =============================================================================
# SBI Spark Optimal ‚Äî UAT
# =============================================================================

spark.master=yarn
spark.submit.deployMode=cluster

spark.jars=${ICEBERG_JAR}
spark.driver.extraClassPath=${SPARK_OZONE_JARS}
spark.executor.extraClassPath=${SPARK_OZONE_JARS}
spark.pyspark.python=python3
spark.pyspark.driver.python=python3

spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.spark_catalog=org.apache.iceberg.spark.SparkSessionCatalog
spark.sql.catalog.spark_catalog.type=hive
spark.sql.catalog.spark_catalog.uri=${HMS_URIS}
spark.hadoop.hive.metastore.uris=${HMS_URIS}
spark.hadoop.hive.metastore.sasl.enabled=true
spark.hadoop.hive.metastore.kerberos.principal=${HMS_PRINCIPAL}

spark.hadoop.fs.ofs.impl=org.apache.hadoop.fs.ozone.RootedOzoneFileSystem
spark.hadoop.ozone.om.service.ids=${OZONE_OM_SERVICE_ID}
spark.hadoop.ozone.om.address.${OZONE_OM_SERVICE_ID}=${OZONE_OM_ADDRESS}

spark.hadoop.hadoop.security.key.provider.path=${KMS_PROVIDER_URI}

spark.yarn.access.hadoopFileSystems=${HDFS_URI},${OFS_URI}
spark.security.credentials.hadoopfs.enabled=true
spark.security.credentials.hive.enabled=true
spark.yarn.security.tokens.hadoopfs.enabled=true
spark.yarn.security.tokens.hive.enabled=true

spark.kerberos.keytab=${KEYTAB}
spark.kerberos.principal=${PRINCIPAL}
spark.yarn.keytab=${KEYTAB}
spark.yarn.principal=${PRINCIPAL}
spark.kerberos.renewal.credentials=ccache

spark.sql.adaptive.enabled=true
spark.sql.adaptive.coalescePartitions.enabled=true
spark.sql.adaptive.skewJoin.enabled=true
spark.sql.shuffle.partitions=100
spark.serializer=org.apache.spark.serializer.KryoSerializer

spark.dynamicAllocation.enabled=true
spark.dynamicAllocation.minExecutors=5
spark.dynamicAllocation.maxExecutors=80
spark.dynamicAllocation.shuffleTracking.enabled=true

spark.sql.iceberg.merge-on-read.enabled=true
spark.eventLog.enabled=true
spark.eventLog.dir=hdfs:///user/spark/applicationHistory

spark.executor.instances=8
spark.executor.cores=4
spark.executor.memory=8g
spark.executor.memoryOverhead=2g
spark.driver.memory=4g
